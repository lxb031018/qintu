name: qintu
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0  # HTTP 请求库，用于调用云函数
  shared_preferences: ^2.2.2  # 本地存储，用于保存非敏感配置
  flutter_dotenv: ^5.1.0  # 环境变量管理
  flutter_secure_storage: ^9.0.0  # 安全存储，用于保存敏感 token

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
