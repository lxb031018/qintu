name: qintu
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0  # HTTP 请求库，用于调用云函数
  shared_preferences: ^2.2.2  # 本地存储，用于保存非敏感配置
  flutter_dotenv: ^5.1.0  # 环境变量管理
  flutter_secure_storage: ^9.0.0  # 安全存储，用于保存敏感 token
  geolocator: ^13.0.2  # 位置服务，用于获取用户位置
  path_provider: ^2.1.2  # 获取文件路径，用于日志文件存储
  
  # 状态管理
  provider: ^6.1.2  # 全局状态管理
  freezed_annotation: ^2.4.1  # 不可变状态模型
  json_annotation: ^4.8.1  # JSON 序列化
  
  # 依赖注入
  get_it: ^7.6.7  # 服务定位器
  
  # 路由管理
  go_router: ^14.2.0  # 声明式路由管理
  
  # 网络请求
  dio: ^5.4.0  # 强大的 HTTP 客户端，支持拦截器

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # 代码生成
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - .env
