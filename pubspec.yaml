name: qintu
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.5  # 本地存储，用于保存非敏感配置
  flutter_dotenv: ^6.0.0  # 环境变量管理
  flutter_secure_storage: ^10.0.0  # 安全存储，用于保存敏感 token
  path_provider: ^2.1.5  # 获取文件路径，用于日志文件存储
  permission_handler: ^12.0.1  # 权限管理，用于位置权限请求

  # 状态管理
  flutter_riverpod: ^3.3.1  # Riverpod 状态管理
  freezed_annotation: 3.1.0  # 不可变状态模型
  json_annotation: ^4.11.0  # JSON 序列化

  # 路由管理
  go_router: ^17.2.2  # 声明式路由管理

  # 网络请求
  dio: ^5.9.2  # 强大的 HTTP 客户端，支持拦截器

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5  # Mock 框架，用于测试

  # 代码生成
  build_runner: ^2.14.0
  freezed: ^3.2.5
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
  assets:
    - .env
